[theme]
primaryColor = "#3B82F6"           # アクセントカラー（明るい青）
backgroundColor = "#0F172A"        # メイン背景（ダークネイビー）
secondaryBackgroundColor = "#1E293B" # カード背景（ミディアムネイビー）
textColor = "#FFFFFF"              # テキスト（白）
font = "sans serif"

[server]
maxUploadSize = 500
headless = true

[browser]
gatherUsageStats = false
